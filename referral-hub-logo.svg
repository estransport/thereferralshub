<svg width="600" height="300" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A3E1A"/>
      <stop offset="100%" stop-color="#5A2A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#C8980A"/>
    </linearGradient>
    <linearGradient id="a1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="100%" stop-color="#D4A820"/>
    </linearGradient>
    <linearGradient id="a2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="100%" stop-color="#D4A820"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="40" y="20" width="600" height="300" rx="22" fill="url(#bg)"/>
  <rect x="40" y="20" width="600" height="300" rx="22" fill="none" stroke="#F0D060" stroke-width="0.7" opacity="0.3"/>
  <g fill="none" stroke="#F0D060" stroke-width="0.9" opacity="0.35">
    <path d="M60 40 L60 54 M60 40 L74 40"/>
    <path d="M620 40 L620 54 M620 40 L606 40"/>
    <path d="M60 300 L60 286 M60 300 L74 300"/>
    <path d="M620 300 L620 286 M620 300 L606 300"/>
  </g>

  <!-- Icon: two interlocked circular arrows -->
  <path d="M140 162 A30 30 0 1 1 168 192"
    fill="none" stroke="url(#a1)" stroke-width="6.5" stroke-linecap="round"/>
  <polygon points="168,180 176,196 160,196" fill="#FFF0A0"/>

  <path d="M196 188 A30 30 0 1 1 168 158"
    fill="none" stroke="url(#a2)" stroke-width="6.5" stroke-linecap="round"/>
  <polygon points="168,170 160,154 176,154" fill="#C8980A"/>

  <!-- Divider -->
  <line x1="252" y1="88" x2="252" y2="252" stroke="#F0D060" stroke-width="0.6" opacity="0.25"/>

  <!-- THE -->
  <text x="272" y="124"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12" letter-spacing="7"
    fill="#F5DC80" opacity="0.75">THE</text>

  <!-- Referral -->
  <text x="268" y="192"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58" font-weight="700" letter-spacing="-1"
    fill="url(#gold)">Referral</text>

  <!-- Rule -->
  <line x1="270" y1="204" x2="610" y2="204" stroke="#F0D060" stroke-width="0.5" opacity="0.4"/>

  <!-- HUB -->
  <text x="272" y="238"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28" font-weight="700" letter-spacing="16"
    fill="#F5DC80">HUB</text>

  <!-- Tagline -->
  <text x="272" y="266"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12" font-weight="700" letter-spacing="3"
    fill="#F0D060" opacity="0.75">SAVE · EARN · GET PAID</text>

</svg>
